services:
  ia-microservice:
    image: ghcr.io/angelporlan/ai-cv-generator:main
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3002:3002"
    environment:
      - PORT=3002
      - NODE_ENV=production
      - DATABASE_URL=postgres://cvstudio:cvstudio@postgres:5432/cvstudio
      - APP_SESSION_SECRET=cv-studio-prod-secret
    env_file:
      - .env
    restart: always
    pull_policy: always
  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=cvstudio
      - POSTGRES_USER=cvstudio
      - POSTGRES_PASSWORD=cvstudio
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cvstudio -d cvstudio"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: always

volumes:
  postgres-data:
