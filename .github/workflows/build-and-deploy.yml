name: Build and Deploy

on:
  push:
    branches:
      - main
      - master

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix={{branch}}-

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trigger VPS webhook
        env:
          VPS_WEBHOOK_URL: ${{ secrets.VPS_WEBHOOK_URL }}
        run: |
          curl --fail --silent --show-error --connect-timeout 10 --max-time 30 --retry 3 --retry-delay 5 \
            -X POST "$VPS_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "{\"image\": \"ghcr.io/${{ github.repository }}:${{ github.ref_name }}\", \"sha\": \"${{ github.sha }}\"}" \
            -w "\n"
        if: ${{ env.VPS_WEBHOOK_URL != '' }}
        continue-on-error: true
